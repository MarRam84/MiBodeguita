<!DOCTYPE html><html lang=es><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Agregar Producto</title><link rel=stylesheet href=/agregar-producto.eeea073c.css><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel=stylesheet><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin=anonymous referrerpolicy=no-referrer><body>

          <option value=Hogar>Hogar</option>

          <option value=Deportes>Deportes</option>

          <option value=Mascotas>Mascotas</option>
          <option value=Calzado>Calzado</option>
          <option value=otros>Otros</option>
          </select>
        </div>

    </div>
