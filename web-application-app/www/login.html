<!DOCTYPE html><html lang=es><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Login - Gestión de Bodega</title><link rel=stylesheet href=/login.6c4cff49.css><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel=stylesheet><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel=stylesheet><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css><body>
    <div class=login-container>
        <div class=login-card>
            <div class=login-header>
                <i class="fa-warehouse fas"></i>
                <h1>BodegaPro</h1>
                <p>Sistema de Gestión de Inventario</p>
            </div>

            <form id=loginForm class=login-form>
                <div class=form-group>
                    <label for=email>
                        <i class="fa-envelope fas"></i> Correo Electrónico
                    </label>
                    <input type=email id=email name=email required placeholder="Ingresa tu correo electrónico" autocomplete=email>
                </div>

                <div class=form-group>
                    <label for=password>
                        <i class="fa-lock fas"></i> Contraseña
                    </label>
                    <div class=password-input>
                        <input type=password id=password name=password required placeholder="Ingresa tu contraseña" autocomplete=current-password>
                        <button type=button id=togglePassword class=password-toggle>
                            <i class="fa-eye fas"></i>
                        </button>
                    </div>
                </div>

                <button class=btn-login>
                    <i class="fa-sign-in-alt fas"></i> Iniciar Sesión
                </button>
            </form>

            <div id=errorMessage class="error-message hidden">
                <i class="fa-exclamation-triangle fas"></i>
                <span id=errorText></span>
            </div>

            <div class=login-footer>
                <p>© 2024 BodegaPro. Todos los derechos reservados.</p>
            </div>
        </div>
    </div>

    <script src=/login.fc2f4e43.js></script>
